<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FIRST — Gestão</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#08090E;--surface:#0F1018;--surface2:#161720;--border:#ffffff0D;--border2:#ffffff18;
    --text:#F0F0F8;--text2:#8888AA;--text3:#44445A;
    --accent:#C9A84C;--accent2:#E8C97A;--blue:#4A8BFF;--green:#3DD68C;--red:#FF5252;--orange:#FF8C42;
    --font:'Sora',sans-serif;--mono:'DM Mono',monospace;
  }
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#ffffff18;border-radius:4px}
  .app{display:flex;flex-direction:column;min-height:100vh;max-width:540px;margin:0 auto}
  .hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
  .hdr-logo{display:flex;align-items:center;gap:10px}
  .hdr-mark{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#C9A84C,#8B6A1F);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#000}
  .hdr-name{font-weight:700;font-size:16px;letter-spacing:.5px;color:var(--text)}
  .hdr-sub{font-size:11px;color:var(--text3);font-weight:500;letter-spacing:.05em;margin-top:1px}
  .badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:.03em}
  .badge-admin{background:#C9A84C18;color:var(--accent2);border:1px solid #C9A84C30}
  .badge-seller{background:#FF8C4218;color:var(--orange);border:1px solid #FF8C4230}
  .content{flex:1;padding:18px 16px 90px;overflow-y:auto}
  .bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:540px;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
  .bnav-item{flex:1;padding:10px 4px 13px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:var(--font)}
  .bnav-icon{font-size:17px;line-height:1}
  .bnav-label{font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
  .bnav-item.active .bnav-icon,.bnav-item.active .bnav-label{color:var(--accent2)}
  .bnav-item:not(.active) .bnav-icon,.bnav-item:not(.active) .bnav-label{color:#333350}
  .sidebar{display:none}
  .page-title{display:none}
  /* ── DESKTOP ── */
  @media(min-width:768px){
    body{overflow:hidden;height:100vh}
    .app{max-width:100%;flex-direction:row;height:100vh;overflow:hidden}
    .hdr{display:none}
    .bnav{display:none}
    .content{padding:28px 32px;overflow-y:auto;height:100vh;flex:1}
    .sidebar{display:flex;flex-direction:column;width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);height:100vh;position:sticky;top:0;flex-shrink:0}
    .sidebar-logo{padding:24px 20px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
    .sidebar-mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#C9A84C,#8B6A1F);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#000;flex-shrink:0}
    .sidebar-name{font-weight:800;font-size:15px;letter-spacing:.3px;color:var(--text)}
    .sidebar-sub{font-size:10px;color:var(--text3);margin-top:1px;letter-spacing:.04em}
    .sidebar-nav{flex:1;padding:12px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
    .sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;font-family:var(--font);border:1px solid transparent;background:transparent;width:100%;text-align:left;transition:background .12s}
    .sidebar-item:hover{background:var(--surface2)}
    .sidebar-item.active{background:#C9A84C12;border-color:#C9A84C22}
    .sidebar-item.active .si-icon,.sidebar-item.active .si-label{color:var(--accent2)}
    .sidebar-item:not(.active) .si-icon{color:var(--text3)}
    .sidebar-item:not(.active) .si-label{color:var(--text2)}
    .si-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
    .si-label{font-size:13px;font-weight:600}
    .sidebar-footer{padding:14px 12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
    .page-title{display:block;font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.4px;margin-bottom:22px}
    .kpi-grid{grid-template-columns:repeat(4,1fr)}
    .row-name{max-width:320px}
    .product-name{max-width:300px}
    .sheet{max-width:480px;border-radius:16px;align-self:center;margin:auto}
    .overlay{align-items:center}
  }
  @media(min-width:1100px){
    .sidebar{width:240px;min-width:240px}
    .content{padding:32px 44px}
  }
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
  .card-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  .card-head h3{font-size:13px;font-weight:700;color:var(--text);letter-spacing:.02em}
  .kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:15px 16px;position:relative;overflow:hidden}
  .kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
  .kpi.blue::before{background:linear-gradient(90deg,var(--blue),transparent)}
  .kpi.green::before{background:linear-gradient(90deg,var(--green),transparent)}
  .kpi.amber::before{background:linear-gradient(90deg,var(--accent),transparent)}
  .kpi.red::before{background:linear-gradient(90deg,var(--red),transparent)}
  .kpi-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
  .kpi-value{font-size:19px;font-weight:700;font-family:var(--mono);letter-spacing:-0.5px}
  .kpi.blue .kpi-value{color:var(--blue)}.kpi.green .kpi-value{color:var(--green)}.kpi.amber .kpi-value{color:var(--accent2)}.kpi.red .kpi-value{color:var(--red)}
  .kpi-sub{font-size:10px;color:var(--text3);margin-top:3px}
  .row{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;transition:background .1s}
  .row:last-child{border-bottom:none}.row:active{background:var(--surface2)}
  .row-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:190px}
  .row-meta{font-size:11px;color:var(--text3)}
  .row-val{font-size:14px;font-weight:700;font-family:var(--mono);color:var(--text);text-align:right}
  .row-profit{font-size:11px;font-family:var(--mono);color:var(--green);text-align:right;margin-top:2px}
  .tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.04em;background:var(--surface2);color:var(--text2);border:1px solid var(--border2)}
  .tag-avulso{background:#FF8C4212;color:var(--orange);border-color:#FF8C4230}
  .alert{background:#C9A84C10;border:1px solid #C9A84C25;border-radius:12px;padding:12px 15px;margin-bottom:14px}
  .alert-title{font-size:12px;font-weight:700;color:var(--accent2);margin-bottom:7px}
  .alert-chips{display:flex;flex-wrap:wrap;gap:6px}
  .alert-chip{background:#C9A84C18;color:var(--accent);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600}
  .form-group{display:flex;flex-direction:column;gap:13px}
  .field-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
  .inp{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:11px 13px;font-size:14px;font-family:var(--font);color:var(--text);outline:none;transition:border-color .15s}
  .inp:focus{border-color:var(--accent)}.inp::placeholder{color:var(--text3)}
  select.inp{cursor:pointer}select.inp option{background:#1A1A2E;color:var(--text)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .pills{display:flex;flex-wrap:wrap;gap:6px}
  .pill{padding:5px 13px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font);border:1px solid var(--border2);background:transparent;color:var(--text2);transition:all .15s}
  .pill.active{background:var(--accent);color:#000;border-color:var(--accent)}
  .btn-primary{width:100%;background:linear-gradient(135deg,#C9A84C,#8B6A1F);color:#000;border:none;border-radius:11px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);letter-spacing:.02em}
  .btn-primary:disabled{opacity:.3;cursor:not-allowed}
  .btn-danger{background:transparent;border:1px solid #FF525230;border-radius:10px;width:100%;padding:12px;color:var(--red);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)}
  .tipo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .tipo-btn{padding:12px;border-radius:11px;font-family:var(--font);cursor:pointer;font-weight:700;font-size:13px;border:1.5px solid var(--border2);background:transparent;color:var(--text2);transition:all .15s}
  .tipo-btn.active-stock{background:#4A8BFF15;color:var(--blue);border-color:#4A8BFF40}
  .tipo-btn.active-avulso{background:#FF8C4215;color:var(--orange);border-color:#FF8C4240}
  .product-row{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background .1s}
  .product-row:last-child{border-bottom:none}.product-row:active{background:var(--surface2)}
  .product-brand{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
  .product-name{font-size:13px;font-weight:600;color:var(--text);overflow:visible;text-overflow:unset;white-space:normal;max-width:none}
  .product-meta{font-size:11px;color:var(--text3);margin-top:3px}
  .stock-badge{font-size:11px;font-weight:700;font-family:var(--mono);padding:3px 9px;border-radius:20px}
  .stock-ok{background:#3DD68C15;color:var(--green);border:1px solid #3DD68C30}
  .stock-low{background:#FF525215;color:var(--red);border:1px solid #FF525230}
  .total-box{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
  .total-line{display:flex;justify-content:space-between;font-size:13px;color:var(--text2);margin-bottom:6px}
  .total-main{display:flex;justify-content:space-between;font-size:21px;font-weight:700;border-top:1px solid var(--border);padding-top:12px;margin-top:8px}
  .total-profit{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-top:5px}
  .dre-header{background:linear-gradient(135deg,var(--surface2),#0A0A14);padding:16px;border-bottom:1px solid var(--border)}
  .dre-row{display:flex;justify-content:space-between;align-items:center;padding:10px 16px}
  .dre-label{font-size:13px;color:var(--text2)}.dre-label.bold{color:var(--text);font-weight:700}.dre-label.indent{padding-left:14px;color:var(--text3);font-size:12px}
  .dre-val{font-size:13px;font-family:var(--mono);font-weight:500;color:var(--text)}.dre-val.bold{font-size:15px;font-weight:700}.dre-val.red{color:var(--red)}
  .dre-block{background:var(--surface2);border:1px solid var(--border);margin:4px 10px;border-radius:10px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center}
  .dre-section{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding:10px 16px 4px}
  .dre-stats{border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(3,1fr);padding:14px 0}
  .dre-stat{text-align:center;border-right:1px solid var(--border)}.dre-stat:last-child{border-right:none}
  .dre-stat-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
  .dre-stat-val{font-size:17px;font-weight:700;font-family:var(--mono);color:var(--text)}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
  .sheet{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-width:540px;padding:24px;padding-bottom:36px;max-height:92vh;overflow-y:auto}
  .sheet-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:18px;letter-spacing:-.3px}
  .margin-preview{background:var(--surface2);border:1px solid #3DD68C20;border-radius:9px;padding:10px 13px;display:flex;gap:20px;font-size:12px}
  .margin-preview span{color:var(--green)}.margin-preview strong{font-family:var(--mono)}
  .autocomplete{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border2);border-radius:11px;z-index:10;box-shadow:0 12px 40px rgba(0,0,0,.6);margin-top:4px;overflow:hidden}
  .ac-item{width:100%;text-align:left;padding:12px 14px;font-size:13px;cursor:pointer;background:none;border:none;border-bottom:1px solid var(--border);font-family:var(--font);color:var(--text);display:flex;justify-content:space-between;align-items:center}
  .ac-item:last-child{border-bottom:none}.ac-item:active{background:var(--surface2)}
  .ac-item-meta{font-size:11px;color:var(--text3);font-family:var(--mono)}
  .sel-prod{background:#4A8BFF10;border:1px solid #4A8BFF25;border-radius:9px;padding:9px 13px;margin-top:6px;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#7EB3FF}
  .brand-bar{margin-bottom:10px}
  .brand-bar-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
  .brand-bar-bg{background:var(--surface2);border-radius:4px;height:4px;overflow:hidden}
  .brand-bar-fill{height:100%;border-radius:4px;transition:width .4s ease}
  .login{min-height:100vh;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;font-family:var(--font)}
  .login-logo{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#C9A84C,#8B6A1F);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:28px;color:#000;margin-bottom:20px;box-shadow:0 8px 32px #C9A84C30}
  .login-title{font-size:26px;font-weight:800;color:var(--text);letter-spacing:-.5px;margin-bottom:4px}
  .login-sub{font-size:13px;color:var(--text3);margin-bottom:36px}
  .login-option{width:100%;max-width:340px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;cursor:pointer;text-align:left;font-family:var(--font);margin-bottom:10px}
  .login-option:hover{border-color:var(--border2)}
  .login-option-title{font-weight:700;font-size:15px;color:var(--text);margin-bottom:3px}
  .login-option-sub{font-size:12px;color:var(--text3)}
  .login-divider{font-size:11px;color:var(--text3);margin:4px 0 12px;text-align:center;width:100%;max-width:340px}
  .login-pin-box{width:100%;max-width:340px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px}
  .pin-title{font-weight:700;font-size:15px;color:var(--text);margin-bottom:14px}
  .pin-hint{font-size:11px;color:var(--text3);text-align:center;margin-top:8px}
  .err-msg{font-size:12px;color:var(--red);font-weight:600;margin-bottom:6px}
  .empty{text-align:center;padding:44px 20px;color:var(--text3)}
  .empty-icon{font-size:34px;margin-bottom:10px;opacity:.5}.empty-text{font-size:13px}
  .info-box{border-radius:10px;padding:10px 13px;font-size:12px;font-weight:500}
  .info-blue{background:#4A8BFF10;border:1px solid #4A8BFF25;color:#7EB3FF}
  .info-orange{background:#FF8C4210;border:1px solid #FF8C4225;color:var(--orange)}
  .success-bar{background:#3DD68C12;border:1px solid #3DD68C30;border-radius:11px;padding:12px 16px;font-size:13px;font-weight:700;color:var(--green);margin-bottom:14px}
  .config-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:12px}
  .config-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:5px}
  .config-sub{font-size:12px;color:var(--text3);line-height:1.6}
  .syncing{position:fixed;top:60px;right:14px;background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--text3);z-index:99;display:flex;align-items:center;gap:6px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spinner{width:10px;height:10px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
</style>
</head>

          sb2.from("config").select("*").eq("key","api_key"),
        ]);
        if(sup&&sup.length>0){
          setSuppliers(prev=>prev.map((s,i)=>{
            const saved=sup.find(r=>r.id===s.id||(r.position!=null&&r.position===i+1));
            return saved?{...s,name:saved.name||s.name}:s;
          }));
        }
        if(cfg&&cfg.length>0)setApiKey(cfg[0].value||"");
      }catch(e){console.warn("Lista Diária init:",e);}
      setLoadingInit(false);
    };
    init();

  const saveName=async(idx,name)=>{
    setSavingName(idx);
    try{
      await sb2.from("suppliers").upsert({id:idx+1,name,position:idx+1},{onConflict:"id"});
    }catch(e){console.warn(e);}
    setSavingName(null);
  };

  const updateSupplier=(idx,field,val)=>{
    setSuppliers(prev=>prev.map((s,i)=>i===idx?{...s,[field]:val}:s));
  };

  const activeSuppliers=suppliers.filter(s=>s.text.trim().length>0);

  const parseTableFromResult=text=>{
    const lines=text.split("\n");
    const products={};
    let currentSupplier=null;
    const supNames=suppliers.map(s=>s.name);

    lines.forEach(line=>{
      const trimmed=line.trim();
      const isSupplierHeader=supNames.some(n=>trimmed.toLowerCase().includes(n.toLowerCase())&&trimmed.length<60);
      if(isSupplierHeader){
        currentSupplier=supNames.find(n=>trimmed.toLowerCase().includes(n.toLowerCase()));
        return;
      }
      const priceMatch=trimmed.match(/(.+?)\s+R?\$?\s*([\d.,]+)/);
      if(priceMatch&&currentSupplier){
        const pname=priceMatch[1].trim();
        const price=parseFloat(priceMatch[2].replace(".","").replace(",","."));
        if(pname&&!isNaN(price)&&price>0){
          if(!products[pname])products[pname]={prices:[],suppliers:[]};
          products[pname].prices.push(price);
          products[pname].suppliers.push(currentSupplier);
        }
      }
    });

    return Object.entries(products).map(([name,{prices,suppliers}])=>{
      const avg=prices.reduce((a,b)=>a+b,0)/prices.length;
      return{name,avgCost:avg,salePrice:avg+490,suppliers,prices};
    }).sort((a,b)=>a.name.localeCompare(b.name));
  };

  const gerar=async()=>{
    if(activeSuppliers.length===0)return;
    if(!apiKey){alert("Chave da API não encontrada no Supabase (config → api_key).");return;}
    setLoading(true);setResult("");setTableData([]);

    const suppliersText=activeSuppliers.map(s=>`=== ${s.name} ===\n${s.text.trim()}`).join("\n\n");

    const prompt=`Você é um assistente especializado em consolidar listas de preços de fornecedores de eletrônicos.

${suppliersText}

Sua tarefa:
1. Analise cada lista com cuidado
2. Para cada produto, identifique o nome e o preço em cada fornecedor
3. Gere uma LISTA DIÁRIA CONSOLIDADA organizada por fornecedor, com todos os produtos e preços limpos e padronizados

=== [Nome do Fornecedor] ===
[Produto] R$ [Preço]
[Produto] R$ [Preço]
...

=== [Próximo Fornecedor] ===
...

Regras importantes:
- Padronize os nomes dos produtos (remova emojis, caracteres especiais desnecessários)
- Mantenha os preços exatos como listados por cada fornecedor
- Ordene os produtos alfabeticamente dentro de cada fornecedor
- Não adicione comentários, apenas a lista formatada`;

    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},
        body:JSON.stringify({model:"claude-opus-4-5",max_tokens:4000,messages:[{role:"user",content:prompt}]})
      });
      const data=await res.json();
      if(data.content&&data.content[0]){
        const text=data.content[0].text;
        setResult(text);
        setTableData(parseTableFromResult(text));
        setSubTab("lista");
      }else{
        setResult("Erro ao processar: "+(data.error?.message||"resposta inválida"));
      }
    }catch(e){
      setResult("Erro de conexão: "+e.message);
    }
    setLoading(false);
  };

  const copiar=()=>{
    navigator.clipboard.writeText(result).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);});
  };

  const Rf=v=>new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL"}).format(v||0);

  if(loadingInit)return React.createElement("div",{style:{textAlign:"center",padding:"48px 20px",color:"var(--text3)",fontSize:13}},"Carregando Lista Diária...");

  return React.createElement("div",null,
    // Sub-tabs

      [{id:"lista",label:"Lista Diária"},{id:"tabela",label:"Tabela de Venda"+(tableData.length>0?" ("+tableData.length+")":"")}].map(t=>
        React.createElement("button",{key:t.id,onClick:()=>setSubTab(t.id),
          style:{padding:"8px 18px",borderRadius:9,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"var(--font)",border:"none",
            background:subTab===t.id?"linear-gradient(135deg,#C9A84C,#8B6A1F)":  "transparent",
            color:subTab===t.id?"#000":"var(--text3)",transition:"all .15s"}},t.label)
      )
    ),

    // ── ABA LISTA ──
    subTab==="lista"&&React.createElement("div",null,
      // Seletor de fornecedores
      React.createElement("div",{style:{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}},
        suppliers.map((s,i)=>React.createElement("button",{key:i,onClick:()=>setActiveSupplier(i),
          style:{padding:"5px 12px",borderRadius:20,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"var(--font)",border:"1.5px solid",
            background:activeSupplier===i?"var(--surface)":"transparent",
            color:activeSupplier===i?"var(--accent2)":"var(--text3)",
            borderColor:activeSupplier===i?"#C9A84C40":"var(--border2)",
            position:"relative"}},
          s.name+(s.text.trim().length>0?" ✓":"")
        ))
      ),

      // Painel do fornecedor ativo
      React.createElement("div",{className:"card",style:{padding:16,marginBottom:14}},
        React.createElement("div",{style:{display:"flex",gap:8,marginBottom:12,alignItems:"center"}},
          React.createElement("input",{
            className:"inp",style:{flex:1,fontWeight:600},
            value:suppliers[activeSupplier].name,
            onChange:e=>updateSupplier(activeSupplier,"name",e.target.value),
            onBlur:e=>saveName(activeSupplier,e.target.value),
            placeholder:"Nome do fornecedor"
          }),
          savingName===activeSupplier&&React.createElement("span",{style:{fontSize:11,color:"var(--text3)"},className:"spinner"})
        ),
        React.createElement("textarea",{
          value:suppliers[activeSupplier].text,
          onChange:e=>updateSupplier(activeSupplier,"text",e.target.value),
          placeholder:"Cole aqui a lista de preços do "+suppliers[activeSupplier].name+"...\n\nEx:\niPhone 16 128GB 3.200\nGarmin Fenix 8 4.100\n...",
          style:{width:"100%",height:220,background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:10,padding:"11px 13px",fontSize:13,fontFamily:"var(--font)",color:"var(--text)",outline:"none",resize:"vertical",lineHeight:1.7}
        }),
        React.createElement("div",{style:{fontSize:11,color:"var(--text3)",marginTop:6}},
          suppliers[activeSupplier].text.trim().length>0
            ?"✓ "+suppliers[activeSupplier].text.trim().split("\n").filter(l=>l.trim()).length+" linhas preenchidas"
            :"Vazio"
        )
      ),

      // Resumo de fornecedores ativos
      activeSuppliers.length>0&&React.createElement("div",{style:{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}},
        React.createElement("span",{style:{fontSize:12,color:"var(--text3)"}},"Prontos para gerar:"),
        activeSuppliers.map((s,i)=>React.createElement("span",{key:i,className:"tag",style:{color:"var(--green)",borderColor:"#3DD68C30",background:"#3DD68C10"}},s.name))
      ),

      // Botão gerar
      React.createElement("button",{
        onClick:gerar,disabled:loading||activeSuppliers.length===0,
        style:{width:"100%",background:loading||activeSuppliers.length===0?"var(--surface2)":"linear-gradient(135deg,#C9A84C,#8B6A1F)",color:loading||activeSuppliers.length===0?"var(--text3)":"#000",border:"none",borderRadius:11,padding:"13px",fontSize:14,fontWeight:700,cursor:loading||activeSuppliers.length===0?"not-allowed":"pointer",fontFamily:"var(--font)",marginBottom:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8}},
        loading
          ?React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8}},React.createElement("div",{className:"spinner"}),React.createElement("span",null,"Gerando lista..."))
          :"⚡  Gerar Lista Consolidada"+(activeSuppliers.length>0?" ("+activeSuppliers.length+" fornecedor"+(activeSuppliers.length>1?"es":"")+")":" — adicione pelo menos 1 lista")
      ),

      // Resultado
      result&&React.createElement("div",{className:"card",style:{overflow:"hidden"}},
        React.createElement("div",{style:{padding:"12px 16px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center"}},
          React.createElement("span",{style:{fontSize:13,fontWeight:700,color:"var(--text)"}},"Lista Consolidada"),
          React.createElement("div",{style:{display:"flex",gap:8}},
            React.createElement("button",{onClick:copiar,
              style:{background:copied?"#3DD68C20":"var(--surface2)",border:"1px solid "+(copied?"#3DD68C40":"var(--border2)"),borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:700,color:copied?"var(--green)":"var(--text2)",cursor:"pointer",fontFamily:"var(--font)"}},
              copied?"✓ Copiado!":"📋 Copiar"
            ),
            tableData.length>0&&React.createElement("button",{onClick:()=>setSubTab("tabela"),
              style:{background:"#C9A84C15",border:"1px solid #C9A84C30",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:700,color:"var(--accent2)",cursor:"pointer",fontFamily:"var(--font)"}},
              "Ver Tabela →"
            )
          )
        ),
        React.createElement("pre",{style:{padding:"14px 16px",fontSize:12,fontFamily:"var(--mono)",color:"var(--text)",lineHeight:1.8,whiteSpace:"pre-wrap",wordBreak:"break-word",background:"var(--surface2)",margin:0,maxHeight:420,overflowY:"auto"}},result)
      )
    ),

    // ── ABA TABELA DE VENDA ──
    subTab==="tabela"&&React.createElement("div",null,
      tableData.length===0
        ?React.createElement("div",{className:"card"},
            React.createElement(Empty,{icon:"📊",text:"Gere uma lista primeiro para ver a tabela de preços"})

              "Média de custo entre fornecedores + R$ 490 = preço de venda sugerido · "+tableData.length+" produtos"

              // Header

  const[qty,setQty]=useState("1");const[disc,setDisc]=useState("0");

  const[hasTrade,setHasTrade]=useState(false);const[tradeModel,setTradeModel]=useState("");const[tradeValue,setTradeValue]=useState("0");

    ?(prod&&q>0&&selId&&q<=(prod?.stock||0))

        React.createElement("div",{className:"grid2"},

          React.createElement(Inp,{label:"Venda (R$)",type:"number",value:form.salePrice,onChange:e=>setForm({...form,salePrice:e.target.value}),placeholder:"0,00"})
        ),

          React.createElement("span",null,"Lucro un.: ",React.createElement("strong",null,R(+form.salePrice-+form.costPrice)))

function Config({pin,setPin,onLogout,sales,products,expenses,store,setStore}){
  const[nPin,setNPin]=useState("");const[conf,setConf]=useState("");const[msg,setMsg]=useState("");
  const[storeForm,setStoreForm]=useState(store);const[storeMsg,setStoreMsg]=useState("");

  const savePin=async()=>{
    if(!nPin||nPin.length<4)return setMsg("PIN precisa ter ao menos 4 dígitos.");
    if(nPin!==conf)return setMsg("Os PINs não coincidem.");
    await sb.from("config").upsert({key:"pin",value:nPin});
    setPin(nPin);setNPin("");setConf("");setMsg("✓ PIN alterado!");setTimeout(()=>setMsg(""),3000);
  };

  const saveStore=async()=>{
    await sb.from("config").upsert({key:"store",value:JSON.stringify(storeForm)});
    setStore(storeForm);setStoreMsg("✓ Dados salvos!");setTimeout(()=>setStoreMsg(""),3000);
  };

  const exportCSV=(rows,filename)=>{
    const bom="\uFEFF";
    const csv=bom+rows.map(r=>r.map(v=>`"${String(v==null?"":v).replace(/"/g,'""')}"`).join(";")).join("\n");
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));
    a.download=filename+"_"+new Date().toISOString().slice(0,10)+".csv";
    a.click();
  };

  const exportEstoque=()=>{
    const rows=[["Produto","Marca","Cor","Custo","Venda","Margem%","Estoque","Est.Mínimo","Condição","Saúde Bateria","Caixa Original"]];
    products.forEach(p=>rows.push([
      p.name,p.brand,p.color||"",
      p.costPrice.toFixed(2).replace(".",","),
      p.salePrice.toFixed(2).replace(".",","),
      (p.salePrice>0?((p.salePrice-p.costPrice)/p.salePrice*100):0).toFixed(1).replace(".",","),
      p.stock,p.minStock||2,
      p.condition||"",
      p.batteryHealth!=null?p.batteryHealth+"":"",
      p.brand==="Apple"?(p.originalBox?"Sim":"Não"):""
    ]));
    exportCSV(rows,"FIRST_estoque");
  };

  const exportVendas=()=>{
    const rows=[["Data","Produto","Marca","Qtd","Pagamento","Desconto","Troca","Valor Troca","Total","Lucro","Sinal","Restante","Entrega","Vendedor","Avulso"]];
    [...sales].reverse().forEach(s=>rows.push([
      Dt(s.date),s.productName,s.brand,s.quantity,s.paymentMethod,
      (s.discount||0).toFixed(2).replace(".",","),
      s.tradeModel||"",(s.tradeValue||0).toFixed(2).replace(".",","),
      s.total.toFixed(2).replace(".",","),
      (s.total-s.costPrice*s.quantity).toFixed(2).replace(".",","),
      (s.signalValue||0).toFixed(2).replace(".",","),
      (s.remaining||0).toFixed(2).replace(".",","),
      s.deliveryType||"Retirada",s.seller||"—",s.avulso?"Sim":"Não"
    ]));
    exportCSV(rows,"FIRST_vendas");
  };

  const exportDespesas=()=>{
    const rows=[["Data","Descrição","Categoria","Valor"]];
    [...expenses].reverse().forEach(e=>rows.push([Dt(e.date),e.description,e.category,e.value.toFixed(2).replace(".",",")]));
    exportCSV(rows,"FIRST_despesas");
  };

  return React.createElement("div",null,
    React.createElement("div",{className:"config-card"},
      React.createElement("div",{className:"config-title"},"🏪  Dados da Loja"),
      React.createElement("div",{className:"config-sub",style:{marginBottom:14}},"Aparecem no recibo de compra e venda."),
      React.createElement("div",{className:"form-group"},
        React.createElement("div",{className:"grid2"},
          React.createElement(Inp,{label:"Nome da Loja",value:storeForm.name||"",onChange:e=>setStoreForm({...storeForm,name:e.target.value}),placeholder:"Ex: FIRST"}),
          React.createElement(Inp,{label:"CNPJ",value:storeForm.cnpj||"",onChange:e=>setStoreForm({...storeForm,cnpj:e.target.value}),placeholder:"00.000.000/0001-00"})
        ),
        React.createElement(Inp,{label:"Endereço Completo",value:storeForm.address||"",onChange:e=>setStoreForm({...storeForm,address:e.target.value}),placeholder:"Rua, número, bairro, cidade — RS"}),
        React.createElement("div",{className:"grid2"},
          React.createElement(Inp,{label:"Telefone/WhatsApp",value:storeForm.phone||"",onChange:e=>setStoreForm({...storeForm,phone:e.target.value}),placeholder:"(51) 99999-9999"}),
          React.createElement(Inp,{label:"E-mail",value:storeForm.email||"",onChange:e=>setStoreForm({...storeForm,email:e.target.value}),placeholder:"contato@first.com.br"})
        ),
        storeMsg&&React.createElement("div",{style:{fontSize:13,fontWeight:600,color:"var(--green)"}},storeMsg),
        React.createElement("button",{className:"btn-primary",onClick:saveStore},"Salvar Dados da Loja")
      )
    ),
    React.createElement("div",{className:"config-card"},
      React.createElement("div",{className:"config-title"},"⬇  Backup e Exportação"),
      React.createElement("div",{className:"config-sub",style:{marginBottom:14}},"Exporte seus dados para Excel a qualquer momento. Abra o .csv no Excel ou Google Sheets."),
      React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:8}},
        React.createElement("button",{onClick:exportVendas,style:{background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:10,padding:"11px 14px",fontSize:13,fontWeight:700,color:"var(--accent2)",cursor:"pointer",fontFamily:"var(--font)",textAlign:"left"}},"📋  Exportar todas as vendas"),
        React.createElement("button",{onClick:exportEstoque,style:{background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:10,padding:"11px 14px",fontSize:13,fontWeight:700,color:"var(--blue)",cursor:"pointer",fontFamily:"var(--font)",textAlign:"left"}},"📦  Exportar estoque"),
        React.createElement("button",{onClick:exportDespesas,style:{background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:10,padding:"11px 14px",fontSize:13,fontWeight:700,color:"var(--red)",cursor:"pointer",fontFamily:"var(--font)",textAlign:"left"}},"💸  Exportar despesas")
      )
    ),
    React.createElement("div",{className:"config-card"},
      React.createElement("div",{className:"config-title"},"🔐  Alterar PIN de Admin"),
      React.createElement("div",{style:{height:12}}),
      React.createElement("div",{className:"form-group"},
        React.createElement(Inp,{label:"Novo PIN",type:"password",inputMode:"numeric",value:nPin,onChange:e=>setNPin(e.target.value),placeholder:"Mínimo 4 dígitos"}),
        React.createElement(Inp,{label:"Confirmar PIN",type:"password",inputMode:"numeric",value:conf,onChange:e=>setConf(e.target.value),placeholder:"Repita o PIN"}),
        msg&&React.createElement("div",{style:{fontSize:13,fontWeight:600,color:msg.startsWith("✓")?"var(--green)":"var(--red)"}},msg),
        React.createElement("button",{className:"btn-primary",onClick:savePin},"Salvar PIN")
      )
    ),
    React.createElement("div",{className:"config-card"},
      React.createElement("div",{className:"config-title"},"👥  Acesso dos Vendedores"),
      React.createElement("div",{className:"config-sub"},"Compartilhe o link do sistema com seus vendedores. Eles entram como Vendedor (sem PIN) e têm acesso apenas ao estoque e registro de vendas.")
    ),
    React.createElement("div",{className:"config-card"},
      React.createElement("div",{className:"config-title"},"🗄️  Banco de Dados — Supabase"),
      React.createElement("div",{className:"config-sub"},"Dados salvos na nuvem e sincronizados em tempo real. Atenção: projetos Supabase inativos por +7 dias são pausados. Exporte backups regularmente.")
    ),
    React.createElement("button",{className:"btn-danger",onClick:onLogout},"Sair do modo Admin")
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const[mode,setMode]=useState(null);const[tab,setTab]=useState("dashboard");
  const[products,setProducts]=useState([]);const[sales,setSales]=useState([]);const[expenses,setExpenses]=useState([]);
  const[customers,setCustomers]=useState([]);const[catalog,setCatalog]=useState([]);
  const[pin,setPin]=useState(DEFAULT_PIN);const[ready,setReady]=useState(false);const[syncing,setSyncing]=useState(false);
  const[store,setStore]=useState({name:"FIRST PHONES LTDA",cnpj:"50.692.681/0001-74",address:"Av. Getúlio Vargas, 4831 — Sala 1105, Torre Medical — Canoas/RS",phone:"(51) 98907-6538",email:"firstgarmin@gmail.com"});

  // Carrega dados do Supabase
  useEffect(()=>{
    const load=async()=>{
      try{
        const[{data:p},{data:s},{data:e},{data:cfg},{data:cust},{data:cat}]=await Promise.all([
          sb.from("products").select("*").order("name"),
          sb.from("sales").select("*").order("date"),
          sb.from("expenses").select("*").order("date"),
          sb.from("config").select("*"),
          sb.from("customers").select("*").order("name"),
          sb.from("catalog").select("*").order("name"),
        ]);
        if(p)setProducts(p.map(fromDB.product));
        if(s)setSales(s.map(fromDB.sale));
        if(e)setExpenses(e.map(fromDB.expense));
        if(cust)setCustomers(cust.map(fromDB.customer));
        if(cat)setCatalog(cat.map(fromDB.catalog));
        if(cfg){
          const pinRow=cfg.find(r=>r.key==="pin");if(pinRow)setPin(pinRow.value);
          const storeRow=cfg.find(r=>r.key==="store");if(storeRow){try{setStore(JSON.parse(storeRow.value));}catch{}}
        }
      }catch(err){
        console.warn("Erro ao carregar dados:",err.message);
      }
      setReady(true);
    };
    load();
  },[]);

  // Escuta mudanças em tempo real (graceful — falha silenciosa se WebSocket não disponível)
  useEffect(()=>{
    if(!ready)return;
    let ch=null;
    try{
      ch=sb.channel("first-realtime")
        .on("postgres_changes",{event:"*",schema:"public",table:"products"},()=>sb.from("products").select("*").order("name").then(({data})=>{if(data)setProducts(data.map(fromDB.product));}))
        .on("postgres_changes",{event:"*",schema:"public",table:"sales"},()=>sb.from("sales").select("*").order("date").then(({data})=>{if(data)setSales(data.map(fromDB.sale));}))
        .on("postgres_changes",{event:"*",schema:"public",table:"expenses"},()=>sb.from("expenses").select("*").order("date").then(({data})=>{if(data)setExpenses(data.map(fromDB.expense));}))
        .on("postgres_changes",{event:"*",schema:"public",table:"customers"},()=>sb.from("customers").select("*").order("name").then(({data})=>{if(data)setCustomers(data.map(fromDB.customer));}))
        .on("postgres_changes",{event:"*",schema:"public",table:"catalog"},()=>sb.from("catalog").select("*").order("name").then(({data})=>{if(data)setCatalog(data.map(fromDB.catalog));}))
        .subscribe((status,err)=>{
          if(err)console.warn("Realtime unavailable:",err.message);
        });
    }catch(e){
      console.warn("Realtime não disponível neste browser:",e.message);
    }
    return()=>{try{if(ch)sb.removeChannel(ch);}catch{}};
  },[ready]);

  const withSync=async fn=>{setSyncing(true);try{await fn();}finally{setSyncing(false);}};

  const onSaveProduct=p=>withSync(async()=>{
    await sb.from("products").upsert(toDB.product(p));
    setProducts(prev=>{const idx=prev.findIndex(x=>x.id===p.id);return idx>=0?prev.map(x=>x.id===p.id?p:x):[...prev,p];});
  });

  const onSaveSale=s=>withSync(async()=>{
    await sb.from("sales").insert(toDB.sale(s));
    setSales(prev=>[...prev,s]);
  });

  const onUpdateStock=(id,newStock)=>withSync(async()=>{
    await sb.from("products").update({stock:newStock}).eq("id",id);
    setProducts(prev=>prev.map(p=>p.id===id?{...p,stock:newStock}:p));
  });

  const onSaveExpense=e=>withSync(async()=>{
    await sb.from("expenses").insert(toDB.expense(e));
    setExpenses(prev=>[...prev,e]);
  });

  const onDelete=(table,id)=>withSync(async()=>{
    await sb.from(table).delete().eq("id",id);
    if(table==="products")setProducts(p=>p.filter(x=>x.id!==id));
    if(table==="sales")setSales(p=>p.filter(x=>x.id!==id));
    if(table==="expenses")setExpenses(p=>p.filter(x=>x.id!==id));
    if(table==="customers")setCustomers(p=>p.filter(x=>x.id!==id));
    if(table==="catalog")setCatalog(p=>p.filter(x=>x.id!==id));
  });

  const onSaveCustomer=c=>withSync(async()=>{
    await sb.from("customers").upsert(toDB.customer(c));
    setCustomers(prev=>{const idx=prev.findIndex(x=>x.id===c.id);return idx>=0?prev.map(x=>x.id===c.id?c:x):[...prev,c];});
  });

  const onSaveCatalog=c=>withSync(async()=>{
    await sb.from("catalog").upsert(toDB.catalog(c));
    setCatalog(prev=>{const idx=prev.findIndex(x=>x.id===c.id);return idx>=0?prev.map(x=>x.id===c.id?c:x):[...prev,c];});
  });

  useEffect(()=>{if(mode==="seller")setTab("estoque");if(mode==="admin")setTab("dashboard");},[mode]);

  if(!ready)return React.createElement("div",{className:"login"},React.createElement("div",{className:"login-logo"},"F"),React.createElement("div",{style:{fontSize:13,color:"var(--text3)",marginTop:14}},"Conectando ao banco de dados..."));
  if(!mode)return React.createElement(Login,{onAdmin:()=>setMode("admin"),onSeller:()=>setMode("seller"),storedPin:pin});

  const isAdmin=mode==="admin";
  const TABS=isAdmin
    ?[{id:"dashboard",icon:"◈",label:"Início"},{id:"estoque",icon:"◫",label:"Estoque"},{id:"vendas",icon:"＋",label:"Vender"},{id:"historico",icon:"≡",label:"Vendas"},{id:"clientes",icon:"◉",label:"Clientes"},{id:"catalogo",icon:"❋",label:"Catálogo"},{id:"lista",icon:"✦",label:"Lista"},{id:"despesas",icon:"↓",label:"Despesas"},{id:"dre",icon:"◎",label:"DRE"},{id:"config",icon:"⚙",label:"Config"}]
    :[{id:"estoque",icon:"◫",label:"Estoque"},{id:"vendas",icon:"＋",label:"Vender"},{id:"lista",icon:"✦",label:"Lista"}];

  const PAGE_TITLES={dashboard:"Painel",estoque:"Estoque",vendas:"Nova Venda",historico:"Histórico de Vendas",clientes:"Clientes",catalogo:"Catálogo",lista:"Lista Diária",despesas:"Despesas",dre:"DRE",config:"Configurações"};

  const Sidebar=()=>React.createElement("div",{className:"sidebar"},
    React.createElement("div",{className:"sidebar-logo"},
      React.createElement("div",{className:"sidebar-mark"},"F"),
      React.createElement("div",null,
        React.createElement("div",{className:"sidebar-name"},"FIRST"),
        React.createElement("div",{className:"sidebar-sub"},"Gestão · Canoas")
      )
    ),
    React.createElement("div",{className:"sidebar-nav"},
      TABS.map(t=>React.createElement("button",{key:t.id,className:"sidebar-item"+(tab===t.id?" active":""),onClick:()=>setTab(t.id)},
        React.createElement("span",{className:"si-icon"},t.icon),
        React.createElement("span",{className:"si-label"},t.label)
      ))
    ),
    React.createElement("div",{className:"sidebar-footer"},
      React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between"}},
        React.createElement("span",{className:"badge "+(isAdmin?"badge-admin":"badge-seller")},isAdmin?"🔐 Admin":"🛍️ Vendedor"),
        !isAdmin&&React.createElement("button",{onClick:()=>setMode(null),style:{background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:8,padding:"4px 10px",cursor:"pointer",color:"var(--text2)",fontSize:11,fontFamily:"var(--font)",fontWeight:600}},"Trocar")
      ),
      isAdmin&&React.createElement("button",{onClick:()=>setMode(null),style:{background:"transparent",border:"1px solid var(--border2)",borderRadius:9,padding:"7px 10px",cursor:"pointer",color:"var(--text3)",fontSize:11,fontFamily:"var(--font)",fontWeight:600,width:"100%",textAlign:"left"}},"← Sair do Admin")
    )
  );

  return React.createElement("div",{className:"app"},
    syncing&&React.createElement(Syncing),
    React.createElement(Sidebar),
    React.createElement("div",{className:"hdr"},
      React.createElement("div",{className:"hdr-logo"},
        React.createElement("div",{className:"hdr-mark"},"F"),
        React.createElement("div",null,React.createElement("div",{className:"hdr-name"},"FIRST"),React.createElement("div",{className:"hdr-sub"},"Gestão · Canoas"))
      ),
      React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8}},
        React.createElement("span",{className:"badge "+(isAdmin?"badge-admin":"badge-seller")},isAdmin?"Admin":"Vendedor"),
        !isAdmin&&React.createElement("button",{onClick:()=>setMode(null),style:{background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:8,padding:"4px 10px",cursor:"pointer",color:"var(--text2)",fontSize:11,fontFamily:"var(--font)",fontWeight:600}},"Trocar")
      )
    ),
    React.createElement("div",{className:"content"},
      React.createElement("div",{className:"page-title"},PAGE_TITLES[tab]||""),
      tab==="dashboard"&&isAdmin&&React.createElement(Dashboard,{products,sales,expenses,setTab}),
      tab==="estoque"&&React.createElement(Estoque,{products,onSave:onSaveProduct,onDelete,isAdmin,syncing}),
      tab==="vendas"&&React.createElement(NovaVenda,{products,onSaveSale,onUpdateStock,syncing,catalog}),
      tab==="historico"&&isAdmin&&React.createElement(Historico,{sales,onDelete,store}),
      tab==="clientes"&&isAdmin&&React.createElement(Clientes,{customers,onSave:onSaveCustomer,onDelete,syncing,sales}),
      tab==="catalogo"&&isAdmin&&React.createElement(Catalogo,{catalog,onSave:onSaveCatalog,onDelete,syncing}),
      tab==="lista"&&React.createElement(ListaDiaria),
      tab==="despesas"&&isAdmin&&React.createElement(Despesas,{expenses,onSave:onSaveExpense,onDelete,syncing}),
      tab==="dre"&&isAdmin&&React.createElement(DRE,{sales,expenses}),
      tab==="config"&&isAdmin&&React.createElement(Config,{pin,setPin,onLogout:()=>setMode(null),sales,products,expenses,store,setStore})
    ),
    React.createElement("div",{className:"bnav"},
      TABS.map(t=>React.createElement("button",{key:t.id,className:"bnav-item"+(tab===t.id?" active":""),onClick:()=>setTab(t.id)},
        React.createElement("span",{className:"bnav-icon"},t.icon),
        React.createElement("span",{className:"bnav-label"},t.label)
      ))
    )
  );
}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
